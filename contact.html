<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Kaalkine for custom YouTube thumbnail design.">
  <title>Kaalkine | Contact</title>
  <link rel="icon" href="assets/brand/kaalkine-logo.svg?v=1781414620712" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Alumni+Sans:wght@700;800;900&family=Alumni+Sans+Pinstripe&family=Albert+Sans:wght@0,500;0,600;0,700;0,800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alumni+Sans:wght@700;800;900&family=Alumni+Sans+Pinstripe&family=Albert+Sans:wght@0,500;0,600;0,700;0,800&display=swap"></noscript>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <img class="logo-mark" src="assets/brand/kaalkine-logo.svg?v=1781414620712" alt="" decoding="async">
        <span class="logo-text">Kaalkine</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" type="button">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links" aria-label="Main navigation"></nav>
    </div>
  </header>

  <main class="contact-page">
    <section class="contact-hero">
      <div class="container contact-hero-inner reveal">
        <h1>Get in touch with Kaalkine</h1>
        <p class="contact-hero-lead"></p>
      </div>
    </section>

    <section class="contact-faq faq">
      <div class="faq-inner">
        <div class="faq-header reveal reveal-up">
          <h2 class="section-title section-title--accent">Frequently Asked Questions</h2>
          <p class="faq-intro">More than half of my inbox revolves around these questions, so I've compiled some answers here. Thanks for reading!</p>
        </div>
        <div class="faq-list"></div>
      </div>
    </section>

    <section class="contact-section">
      <div class="container contact-form-wrap">
        <aside class="contact-discord-note reveal reveal-up" aria-label="Discord contact option">
          <p class="contact-discord-text"></p>
          <div class="contact-discord-handle"></div>
        </aside>
        <form id="contact-form" class="contact-form reveal reveal-up" action="https://formspree.io/f/xlgkwzdn" method="POST">
          <div class="form-group">
            <label for="name">Your name</label>
            <input type="text" id="name" name="name" required autocomplete="name" placeholder="John Doe">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="platform">How should I contact you?</label>
              <select id="platform" name="platform" required>
                <option value="">Choose platform…</option>
              </select>
            </div>
            <div class="form-group">
              <label for="handle">Handle / Email</label>
              <input type="text" id="handle" name="handle" required placeholder="@john_doe123" autocomplete="email">
            </div>
          </div>

          <div class="form-group">
            <label for="channel">Link to your YouTube channel</label>
            <input type="url" id="channel" name="channel" placeholder="youtube.com/@yourchannel">
          </div>

          <div class="form-group">
            <label for="thumbnails">How many thumbnails do you need?</label>
            <input type="number" id="thumbnails" name="thumbnails" min="1" max="99" value="1" required>
          </div>

          <div class="form-group">
            <label for="message">Describe your project to me:</label>
            <textarea id="message" name="message" required placeholder="Provide as much detail as possible…"></textarea>
          </div>

          <div class="contact-summary">
            <div class="contact-summary-stat">
              <span class="contact-summary-label">TOTAL</span>
              <span id="quote-total" class="contact-summary-value">$40*</span>
            </div>
            <div class="contact-summary-stat">
              <span class="contact-summary-label">TURNAROUND</span>
              <span id="quote-turnaround" class="contact-summary-value">1-3 DAYS**</span>
            </div>
          </div>

          <div class="contact-footnotes"></div>

          <div id="form-status" class="form-status" role="status"></div>
          <button type="submit" class="btn btn-primary btn-submit">Submit</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="contact-footer-band">
    <div class="container contact-footer-inner">
      <p class="contact-footer-copy">© Kaalkine 2026</p>
      <div class="social-links contact-footer-socials"></div>
    </div>
  </footer>

  <script src="js/utils.js" defer></script>
  <script src="js/manimate.js" defer></script>
  <script src="js/reveals.js" defer></script>
  <script src="js/contact.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
